<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .text-base {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .node-rect {
      fill: #fff;
      stroke: #e2e8f0;
      stroke-width: 1;
      filter: url(#shadow);
    }

    .node-icon {
      fill: #3b82f6;
    }

    .node-label {
      font-size: 10px;
      fill: #64748b;
    }

    .node-value {
      font-size: 11px;
      fill: #1e293b;
      font-weight: bold;
    }

  </style>

  <rect width="600" height="400" fill="transparent" rx="12" />

  <g transform="translate(40, 170)">
    <rect width="260" height="36" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5">
      <animate attributeName="stroke" values="#d1d5db;#3b82f6;#3b82f6;#d1d5db" dur="6s" repeatCount="indefinite"
        keyTimes="0;0.2;0.8;1" />
      <!-- 与光标落到输入框（motion t≈0.2）同步再亮起 -->
      <animate attributeName="fill" values="#ffffff;#eff6ff;#eff6ff;#ffffff" dur="6s" repeatCount="indefinite"
        keyTimes="0;0.2;0.38;1" />
    </rect>

    <!-- 圆心置于原点再 scale，波纹从点击中心扩散；与 6s 周期同步重复 -->
    <g transform="translate(20, 18)">
      <circle cx="0" cy="0" r="8" fill="rgba(59, 130, 246, 0.45)" stroke="rgba(59, 130, 246, 0.65)" stroke-width="1">
        <animate attributeName="opacity" values="0;0;1;0.85;0;0" dur="6s" repeatCount="indefinite"
          keyTimes="0;0.2;0.22;0.29;0.35;1" />
        <animateTransform attributeName="transform" type="scale" values="0.15;0.15;0.4;2.4;3;0.15" dur="6s"
          repeatCount="indefinite" keyTimes="0;0.2;0.22;0.29;0.35;1" calcMode="linear" />
      </circle>
      <!-- 第二道稍慢的环，让点击更有层次 -->
      <circle cx="0" cy="0" r="8" fill="none" stroke="rgba(59, 130, 246, 0.5)" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" values="0;0;0.9;0;0;0" dur="6s" repeatCount="indefinite"
          keyTimes="0;0.2;0.24;0.37;0.43;1" />
        <animateTransform attributeName="transform" type="scale" values="0.2;0.2;0.5;2.8;3.2;0.2" dur="6s"
          repeatCount="indefinite" keyTimes="0;0.2;0.24;0.37;0.43;1" calcMode="linear" />
      </circle>
    </g>

    <text x="12" y="22" class="text-base" style="font-size: 14px; fill: #1e293b;">
      <tspan>
        <animate attributeName="display" values="none;inline;inline;none" dur="6s" repeatCount="indefinite"
          keyTimes="0;0.5;0.85;1" />
        手
      </tspan>
      <tspan>
        <animate attributeName="display" values="none;inline;inline;none" dur="6s" repeatCount="indefinite"
          keyTimes="0;0.6;0.85;1" />
        机
      </tspan>
      <tspan fill="#3b82f6">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
        |
      </tspan>
    </text>
  </g>

  <g transform="translate(360, 60)">
    <g transform="translate(70,-20)">
      <circle r="10" fill="#ef4444" />
      <circle r="16" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6">
        <animate attributeName="r" values="10;22;10" dur="1.6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1.6s" repeatCount="indefinite" />
      </circle>
      <text x="28" y="5" fill="#b91c1c" font-size="13" font-weight="700" font-family="system-ui,sans-serif">REC</text>
    </g>

    <!-- 动作略早、节点略晚（约 +0.03 周期），再保持到周期末一起淡出 -->
    <g transform="translate(0, 10)">
      <rect width="180" height="40" rx="6" class="node-rect" />
      <circle cx="20" cy="20" r="8" fill="#dbeafe" />
      <path d="M18 18l4 4m0-4l-4 4" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" />
      <text x="40" y="16" class="node-label">MOUSE CLICK</text>
      <text x="40" y="30" class="node-value">#search-input</text>

      <animate attributeName="opacity" values="0;0;1;1;1;0" dur="6s" repeatCount="indefinite"
        keyTimes="0;0.21;0.24;0.92;0.98;1" />
      <animateTransform attributeName="transform" type="translate" values="20 20;20 20;0 10;0 10;0 10;20 20" dur="6s"
        repeatCount="indefinite" keyTimes="0;0.21;0.27;0.92;0.98;1" calcMode="linear" />
    </g>

    <g transform="translate(0, 60)">
      <rect width="180" height="40" rx="6" class="node-rect" />
      <circle cx="20" cy="20" r="8" fill="#dcfce7" />
      <text x="16" y="24" style="fill:#16a34a; font-size:10px; font-weight:bold;">T</text>
      <text x="40" y="16" class="node-label">INPUT VALUE</text>
      <text x="40" y="30" class="node-value">手机</text>

      <animate attributeName="opacity" values="0;0;1;1;1;0" dur="6s" repeatCount="indefinite"
        keyTimes="0;0.51;0.54;0.92;0.98;1" />
      <animateTransform attributeName="transform" type="translate" values="20 70;20 70;0 60;0 60;0 60;20 70" dur="6s"
        repeatCount="indefinite" keyTimes="0;0.51;0.57;0.92;0.98;1" calcMode="linear" />
    </g>

    <g transform="translate(0, 110)">
      <rect width="180" height="40" rx="6" class="node-rect" style="stroke:#3b82f6; stroke-width:1.5; fill:#eff6ff;" />
      <circle cx="20" cy="20" r="8" fill="#3b82f6" />
      <path d="M23 17l-4 4 4 4" stroke="#fff" stroke-width="1.5" fill="none" />
      <text x="40" y="16" class="node-label" style="fill:#3b82f6;">KEY PRESS</text>
      <text x="40" y="30" class="node-value" style="fill:#1e3a8a;">Enter</text>

      <animate attributeName="opacity" values="0;0;1;1;1;0" dur="6s" repeatCount="indefinite"
        keyTimes="0;0.73;0.76;0.92;0.98;1" />
      <animateTransform attributeName="transform" type="translate" values="20 120;20 120;0 110;0 110;0 110;20 120"
        dur="6s" repeatCount="indefinite" keyTimes="0;0.73;0.79;0.92;0.98;1" calcMode="linear" />
    </g>
  </g>

  <g>
    <path d="M0,0 L12,12 L7,12 L10,18 L8,19 L5,13 L0,17 Z" fill="#1e293b" stroke="#fff" stroke-width="1" />
    <!-- keyPoints：路径中点=输入框位置，保证 t=0.2 时光标已到位，再与波纹/描边对齐 -->
    <animateMotion path="M 300,300 L 60,195 L 60,195 L 60,195 L 300,300" dur="6s" repeatCount="indefinite"
      keyTimes="0;0.2;0.8;0.85;1" keyPoints="0;0.5;0.5;0.5;1" calcMode="spline"
      keySplines="0.42 0 0.2 1;0 0 1 1;0.35 0 0.2 1;0.4 0 0.2 1" />

    <animateTransform attributeName="transform" type="scale" values="1;1;0.8;1;1" dur="6s" repeatCount="indefinite"
      keyTimes="0;0.2;0.22;0.27;1" />
  </g>
</svg>